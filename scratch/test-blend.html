<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background: #0a0e17; /* Assuming dark background for header */
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 50px;
      padding: 50px;
    }
    .logo-container {
      width: 300px;
      height: 150px;
      position: relative;
    }
    .logo-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      /* The magic trick */
      mix-blend-mode: screen;
      filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3)); /* Optional extra glow */
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <img src="../public/logo-1-processed.png" class="logo-img" alt="Findora Screen" />
  </div>
</body>
</html>
