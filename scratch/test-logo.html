<!DOCTYPE html>
<html>
<head>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@300;400&display=swap');
    body {
      background: #0a0e17; /* Dark background to see the gold */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .logo-container {
      width: 400px;
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <svg viewBox="0 0 400 120" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#F2D06B" />
          <stop offset="35%" stop-color="#C59B3C" />
          <stop offset="50%" stop-color="#F9E29C" />
          <stop offset="80%" stop-color="#B3862A" />
          <stop offset="100%" stop-color="#E2BA55" />
        </linearGradient>
      </defs>

      <!-- The Custom F -->
      <!-- Vertical stem -->
      <path d="M 45 35 Q 35 35 35 45 L 35 85 L 45 85 L 45 65 L 60 65 L 60 58 L 45 58 L 45 42 L 70 42 L 70 35 Z" fill="url(#gold)" />
      <!-- Stylized top swoosh -->
      <path d="M 20 40 C 20 20 45 15 75 15 C 85 15 95 18 100 22 C 95 16 80 10 65 10 C 40 10 10 15 10 35 Q 10 40 15 45 Z" fill="url(#gold)" />
      
      <!-- INDORA Text -->
      <text x="80" y="85" font-family="'Cinzel', serif" font-weight="700" font-size="52" fill="url(#gold)" letter-spacing="4">INDORA</text>
      
      <!-- Subtitle -->
      <text x="40" y="110" font-family="'Inter', sans-serif" font-weight="400" font-size="10" fill="#a0a5b1" letter-spacing="3.5">
        YOUR DEAL
      </text>

      <!-- Infinity / Knot -->
      <g transform="translate(182, 103) scale(0.6)">
        <path d="M 0 5 C 0 -2 8 -2 12 5 C 16 12 24 12 24 5 C 24 -2 16 -2 12 5 C 8 12 0 12 0 5" fill="none" stroke="url(#gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Small diamond in center -->
        <polygon points="12,2 14,5 12,8 10,5" fill="url(#gold)" />
      </g>
      
      <text x="215" y="110" font-family="'Inter', sans-serif" font-weight="400" font-size="10" fill="#a0a5b1" letter-spacing="3.5">
        OUR HUNT
      </text>

    </svg>
  </div>
</body>
</html>
